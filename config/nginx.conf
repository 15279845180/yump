# VOS3000 多节点管理平台 - Nginx 配置参考
# 宝塔 vhost 配置文件（供复制粘贴到宝塔站点配置中）

server
{
    listen 80;
    server_name 127.0.0.1;  # 线上改为实际域名
    index index.php index.html index.htm default.php default.htm default.html;
    root D:/code/php/yump;   # 项目根目录（PHP 后端所在目录）

    # 宝塔扩展配置（保持默认）
    include D:/tool/BT/BtSoft/nginx/conf/vhost/extension/127.0.0.1/*.conf;

	#START-ERROR-PAGE
	error_page 404 /404.html;
	#END-ERROR-PAGE

    # 前端页面（SPA 入口）— index.html 不缓存，确保每次拿到最新版本引用
    location / {
        root D:/code/php/yump/dist;
        try_files $uri $uri/ /index.html;
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }

    # 前端构建产物静态资源（CSS/JS）
    location /assets/ {
        alias D:/code/php/yump/dist/assets/;
        expires 30d;
    }

    # API 请求 -> 统一入口 router.php，由 router.php 按 /api/{resource} 分发
    # 后续新增接口只需在 server/api/router.php 的 $entryMap 中加一行即可
    location /api/ {
        try_files $uri $uri/ /server/api/router.php?$query_string;
    }

    # 确保 router.php 用正确的 root 执行（不依赖 server 级 root）
    # 解决 try_files 内部重定向时 PHP 处理器继承错误 root 导致 404 的问题
    location ~ ^/server/api/.*\.php$ {
        root D:/code/php/yump;
        include php/81.conf;
        fastcgi_intercept_errors off;
    }

    #PHP-INFO-START（其他 PHP 文件）
    include php/81.conf;
    #PHP-INFO-END

    #REWRITE-START
    # 注意：SPA 路由已迁移到上方的 location / 中，
    # 请清空 rewrite/127.0.0.1/127.0.0.1.conf 避免重复 location /
    # include rewrite/127.0.0.1/*.conf;
    #REWRITE-END

    # 安全：禁止访问敏感文件
    location ~ ^/(\.user\.ini|\.htaccess|\.git|\.svn|\.project|LICENSE|README\.md){
        return 404;
    }
    location ~ /\.env {
        deny all;
        return 404;
    }

    access_log  D:/tool/BT/BtSoft/wwwlogs/127.0.0.1.log;
    error_log  D:/tool/BT/BtSoft/wwwlogs/127.0.0.1.error.log;
}
